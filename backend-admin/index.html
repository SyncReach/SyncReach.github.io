<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncReach — Content Admin</title>
</head>
<body>
<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
<script>
/* Adds a "Dashboard" entry to Sveltia's collections sidebar, styled by cloning
   an existing collection item. Sveltia has no plugin API, so this re-injects
   whenever the sidebar re-renders. Links to /backend-admin/dashboard/ */
(function () {
  function inject() {
    if (document.getElementById('sr-dash-nav')) return;
    var target = null;
    document.querySelectorAll('button[role="option"] .label').forEach(function (l) {
      if (l.textContent.trim() === 'Site pages') target = l.closest('.sui.option');
    });
    if (!target) return;
    var clone = target.cloneNode(true);
    clone.id = 'sr-dash-nav';
    var btn = clone.querySelector('button');
    if (!btn) return;
    btn.setAttribute('aria-selected', 'false');
    btn.setAttribute('value', 'Dashboard');
    btn.setAttribute('data-search-value', 'Dashboard');
    var t = clone.querySelector('.truncated-text');
    if (t) t.textContent = 'Dashboard';
    var icon = clone.querySelector('.icon');
    if (icon) icon.textContent = 'monitoring';
    var badge = clone.querySelector('.count');
    if (badge) badge.remove();
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      e.preventDefault();
      window.location.href = '/backend-admin/dashboard/';
    }, true);
    target.parentElement.appendChild(clone);
  }
  new MutationObserver(inject).observe(document.body, { subtree: true, childList: true });
  inject();
})();
</script>
</body>
</html>
